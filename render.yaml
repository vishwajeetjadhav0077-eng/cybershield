services:
  - type: web
    name: cybershield-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: MODELS_DIR
        value: models
      - key: DB_PATH
        value: /var/data/predictions.db
    disk:
      name: cybershield-data
      mountPath: /var/data
      sizeGB: 1
